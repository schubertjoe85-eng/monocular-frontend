<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monocular</title>
  <style>
    body { margin:0; background:#10110F; color:white; font-family:Arial; }
    .wrap { max-width:760px; margin:auto; padding:40px 22px; }
    h1 { text-align:center; font-size:44px; letter-spacing:2px; }
    .sub { text-align:center; color:#C9894B; font-weight:800; }
    .card { background:#171B16; border:1px solid #6E8B3D; border-radius:24px; padding:22px; margin-top:30px; }
    textarea { width:100%; min-height:140px; background:#10110F; color:white; border:0; border-radius:18px; padding:16px; font-size:16px; box-sizing:border-box; }
    button { width:100%; padding:18px; border:0; border-radius:18px; margin-top:18px; background:#C9894B; color:white; font-weight:900; font-size:18px; }
    input { margin:14px 0; color:white; }
    img { width:100%; border-radius:24px; margin-top:22px; }
    #msg { text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MONOCULAR</h1>
    <p class="sub">AI Architectural Rendering</p>

    <div class="card">
      <input id="file" type="file" accept="image/*" />
      <textarea id="prompt" placeholder="Describe the building, materials, landscape, light, mood..."></textarea>
      <button onclick="render()">RENDER</button>
      <p id="msg"></p>
      <img id="preview" style="display:none;" />
      <img id="result" style="display:none;" />
    </div>
  </div>

<script>
const API_URL = "https://monocular-server.onrender.com";
let imageBase64 = "";

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    imageBase64 = dataUrl.split(",")[1];
    const img = document.getElementById("preview");
    img.src = dataUrl;
    img.style.display = "block";
    document.getElementById("msg").innerText = "Image loaded.";
  };
  reader.readAsDataURL(file);
});

async function render() {
  const prompt = document.getElementById("prompt").value;
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");

  msg.innerText = "Rendering...";
  result.style.display = "none";

  try {
    const res = await fetch(API_URL + "/render", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, imageBase64 })
    });

    const data = await res.json();

    if (data.image) {
      result.src = data.image;
      result.style.display = "block";
      msg.innerText = "Render complete.";
    } else {
      msg.innerText = data.error || "Render failed.";
    }
  } catch (e) {
    msg.innerText = "Server connection failed.";
  }
}
</script>
</body>
</html>
